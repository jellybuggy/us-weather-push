name: 50-Day Winter Replenishment Alert System

on:
  # 每天北京时间 7:30 (UTC 23:30 前一天)
  schedule:
    - cron: '30 23 * * *'
  # 手动触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =============================================
  # Module 1: Daily Weather Forecast
  # =============================================
  daily-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: 运行 Module 1 - Daily Weather Forecast
        env:
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python weather.py

  # =============================================
  # Module 2: 50-Day Winter Replenishment Alert
  # =============================================
  replenishment-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: 运行 Module 2 - 50-Day Winter Replenishment Alert
        env:
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python noaa_outlook.py
